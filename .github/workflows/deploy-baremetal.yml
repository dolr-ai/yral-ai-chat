name: Fix SSH Key

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  fix-ssh-key:
    name: Fix SSH Key
    runs-on: ubuntu-latest

    steps:
      - name: Generate new SSH key pair
        run: |
          ssh-keygen -t ed25519 -C "yral-ai-chat-deploy-$(date +%Y%m%d)" -f /tmp/new_deploy_key -N ""
          echo "NEW_PUBLIC_KEY=$(cat /tmp/new_deploy_key.pub)" >> $GITHUB_ENV

      - name: Setup root SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}

      - name: Add servers to known hosts
        run: |
          IPS="${{ vars.PG_SERVER_IP }}"
          for ip in $(echo "$IPS" | tr ',' ' '); do
            ssh-keyscan -H "$ip" >> ~/.ssh/known_hosts
          done

      - name: Update authorized_keys on servers
        run: |
          IPS="${{ vars.PG_SERVER_IP }}"
          NEW_PUB_KEY="${{ env.NEW_PUBLIC_KEY }}"
          for ip in $(echo "$IPS" | tr ',' ' '); do
            ssh root@$ip "
              echo '$NEW_PUB_KEY' > /home/yral-ai-chat/.ssh/authorized_keys
              chmod 600 /home/yral-ai-chat/.ssh/authorized_keys
              chown yral-ai-chat:yral-ai-chat /home/yral-ai-chat/.ssh/authorized_keys
              echo 'authorized_keys updated on $ip'
            "
          done

      - name: Install Vault CLI
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y vault

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-ai-chat-write-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          exportToken: true

      - name: Write new private key to Vault
        run: |
          NEW_PRIVATE_KEY=$(cat /tmp/new_deploy_key)
          echo "::add-mask::$NEW_PRIVATE_KEY"
          vault kv put secret/yral-ai-chat/PG_SSH_PRIVATE_KEY value="$NEW_PRIVATE_KEY"
          echo "Vault SSH_PRIVATE_KEY updated successfully"
        env:
          VAULT_ADDR: https://vault.yral.com

      - name: Verify new key works
        run: |
          ssh-add -D
          ssh-add /tmp/new_deploy_key

          IPS="${{ vars.PG_SERVER_IP }}"
          for ip in $(echo "$IPS" | tr ',' ' '); do
            ssh -o PasswordAuthentication=no \
                yral-ai-chat@$ip \
                "echo 'New key verified on $ip'"
          done

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/new_deploy_key /tmp/new_deploy_key.pub
          ssh-add -D || true