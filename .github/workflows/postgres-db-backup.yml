name: Postgres Backup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      s3_prefix:
        description: "Override S3 prefix (optional)"
        required: false

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-ai-chat-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/yral-ai-chat/PG_AWS_ACCESS_KEY_ID value | PG_AWS_ACCESS_KEY_ID ;
            secret/data/yral-ai-chat/PG_AWS_SECRET_ACCESS_KEY value | PG_AWS_SECRET_ACCESS_KEY ;
            secret/data/yral-ai-chat/PG_AWS_REGION value | PG_AWS_REGION ;
            secret/data/yral-ai-chat/PG_SSH_PRIVATE_KEY value | PG_SSH_PRIVATE_KEY ;
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.PG_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ vars.PG_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Check server connectivity
        run: |
          ssh -o ConnectTimeout=10 yral-ai-chat@${{ vars.PG_SERVER_IP }} "echo 'Server connection successful'"

      - name: Run backup via SSH
        run: |
          PREFIX="${{ github.event.inputs.s3_prefix }}"

          if [ -z "$PREFIX" ]; then
            PREFIX="${{ vars.WALG_S3_PREFIX }}"
          fi

          ssh yral-ai-chat@${{ vars.PG_SERVER_IP }} \
            "/usr/local/bin/run-postgres-backup.sh \
            '${{ env.PG_AWS_ACCESS_KEY_ID }}' \
            '${{ env.PG_AWS_SECRET_ACCESS_KEY }}' \
            '${{ env.PG_AWS_REGION }}' \
            '$PREFIX'"
  rotate-ssh-keys:
    name: Rotate SSH Keys
    needs: [backup]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Import current SSH key from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-ai-chat-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/yral-ai-chat/PG_SSH_PRIVATE_KEY value | PG_SSH_PRIVATE_KEY ;

      - name: Setup current SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.PG_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ vars.PG_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Generate new SSH key pair
        run: |
          ssh-keygen -t ed25519 -C "yral-ai-chat-pg-$(date +%Y%m%d)" -f /tmp/new_deploy_key -N ""
          echo "NEW_PUBLIC_KEY=$(cat /tmp/new_deploy_key.pub)" >> $GITHUB_ENV

      - name: Append new public key to server
        run: |
          NEW_PUB_KEY="${{ env.NEW_PUBLIC_KEY }}"
          ssh yral-ai-chat@${{ vars.PG_SERVER_IP }} "
            echo '$NEW_PUB_KEY' >> ~/.ssh/authorized_keys
            echo 'New key appended'
          "

      - name: Install Vault CLI
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y vault

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-ai-chat-write-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          exportToken: true

      - name: Write new private key to Vault
        run: |
          NEW_PRIVATE_KEY=$(cat /tmp/new_deploy_key)
          echo "::add-mask::$NEW_PRIVATE_KEY"
          vault kv put secret/yral-ai-chat/PG_SSH_PRIVATE_KEY value="$NEW_PRIVATE_KEY"
          echo "Vault updated with new private key"
        env:
          VAULT_ADDR: https://vault.yral.com

      - name: Verify new key works
        run: |
          ssh-add -D
          ssh-add /tmp/new_deploy_key
          ssh -o PasswordAuthentication=no \
              yral-ai-chat@${{ vars.PG_SERVER_IP }} \
              "echo 'New key verified'"

      - name: Remove old public key from server
        run: |
          NEW_PUB_KEY="${{ env.NEW_PUBLIC_KEY }}"
          ssh yral-ai-chat@${{ vars.PG_SERVER_IP }} "
            set -e
            grep -F '$NEW_PUB_KEY' ~/.ssh/authorized_keys > /tmp/authorized_keys_new
            mv /tmp/authorized_keys_new ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo 'Old key removed'
          "

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/new_deploy_key /tmp/new_deploy_key.pub
          ssh-add -D || true