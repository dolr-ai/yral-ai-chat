name: Upload secrets to vault

on:
  workflow_dispatch:
  push:
    branches:
      - naitik/upload_secret_to_vault

permissions:
  id-token: write   
  contents: read

jobs:
  upload-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-ai-chat-write-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          exportToken: true

      - name: Install Vault CLI
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install vault

      - name: Set Secrets
        env:
          VAULT_ADDR: https://vault.yral.com
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY  }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CHAT: ${{ secrets.GOOGLE_CHAT }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          LITESTREAM_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          LITESTREAM_BUCKET: ${{ secrets.LITESTREAM_BUCKET }}
          LITESTREAM_ENDPOINT: ${{ secrets.LITESTREAM_ENDPOINT }}
          LITESTREAM_REGION: ${{ secrets.LITESTREAM_REGION }}
          LITESTREAM_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MAX_TOKENS: ${{ secrets.OPENROUTER_MAX_TOKENS }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_TEMPERATURE: ${{ secrets.OPENROUTER_TEMPERATURE }}
          OPENROUTER_TIMEOUT: ${{ secrets.OPENROUTER_TIMEOUT }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_PUBLIC_URL_BASE: ${{ secrets.S3_PUBLIC_URL_BASE }}
          S3_URL_EXPIRES_SECONDS: ${{ secrets.S3_URL_EXPIRES_SECONDS }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_WEBHOOK_SECRET: ${{ secrets.SENTRY_WEBHOOK_SECRET }}
          USE_S3: ${{ secrets.USE_S3 }}
          YRAL_METADATA_NOTIFICATION_API_KEY: ${{ secrets.YRAL_METADATA_NOTIFICATION_API_KEY }}          
        run: |
          vault kv put secret/yral-ai-chat/OPENROUTER_TEMPERATURE value="$OPENROUTER_TEMPERATURE"
          vault kv put secret/yral-ai-chat/OPENROUTER_TIMEOUT value="$OPENROUTER_TIMEOUT"
          vault kv put secret/yral-ai-chat/REPLICATE_API_TOKEN value="$REPLICATE_API_TOKEN"
          vault kv put secret/yral-ai-chat/S3_ENDPOINT_URL value="$S3_ENDPOINT_URL"
          vault kv put secret/yral-ai-chat/S3_PUBLIC_URL_BASE value="$S3_PUBLIC_URL_BASE"
          vault kv put secret/yral-ai-chat/S3_URL_EXPIRES_SECONDS value="$S3_URL_EXPIRES_SECONDS"
          vault kv put secret/yral-ai-chat/SENTRY_DSN value="$SENTRY_DSN"
          vault kv put secret/yral-ai-chat/SENTRY_WEBHOOK_SECRET value="$SENTRY_WEBHOOK_SECRET"
          vault kv put secret/yral-ai-chat/USE_S3 value="$USE_S3"
          vault kv put secret/yral-ai-chat/YRAL_METADATA_NOTIFICATION_API_KEY value="$YRAL_METADATA_NOTIFICATION_API_KEY"